<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" role="img" aria-label="graphcode terminal session">
  <title>graphcode terminal session</title>
  <defs>
    <clipPath id="screen-clip">
      <rect x="0" y="36" width="900" height="524" rx="0" />
    </clipPath>
  </defs>

  <!-- frame -->
  <rect x="0" y="0" width="900" height="560" rx="10" fill="#0d1117" />
  <rect x="0.5" y="0.5" width="899" height="559" rx="10" fill="none" stroke="#30363d" />

  <!-- titlebar -->
  <rect x="0" y="0" width="900" height="36" rx="10" fill="#161b22" />
  <rect x="0" y="26" width="900" height="10" fill="#161b22" />
  <circle cx="22" cy="18" r="6" fill="#ff5f56" />
  <circle cx="44" cy="18" r="6" fill="#ffbd2e" />
  <circle cx="66" cy="18" r="6" fill="#27c93f" />
  <text x="450" y="23" text-anchor="middle" font-family="'SF Mono', 'Menlo', monospace" font-size="13" fill="#8b949e">graphcode — repo/graphcode-cli</text>

  <g clip-path="url(#screen-clip)" font-family="'SF Mono', 'Menlo', 'Consolas', monospace" font-size="15">
    <!-- prompt -->
    <text x="24" y="70" fill="#58a6ff">$</text>
    <text x="42" y="70" fill="#c9d1d9">graphcode</text>

    <!-- sync line -->
    <text x="24" y="102" fill="#8b949e">syncing knowledge graph…</text>
    <text x="24" y="128" fill="#3fb950">✓</text>
    <text x="42" y="128" fill="#c9d1d9">1,248 files · 9,306 symbols · 612 commits · 41 docs indexed in 3.8s</text>
    <text x="24" y="150" fill="#8b949e">.graphcode/graph.db  (26,940 edges)</text>

    <!-- blank -->
    <text x="24" y="188" fill="#58a6ff">›</text>
    <text x="42" y="188" fill="#c9d1d9">what breaks if I change RateLimiter.acquire?</text>

    <!-- tool call -->
    <rect x="24" y="208" width="852" height="86" rx="6" fill="#161b22" stroke="#30363d" />
    <text x="40" y="230" fill="#d2a8ff">● graph_explore</text>
    <text x="176" y="230" fill="#8b949e">(symbol: "RateLimiter.acquire", edge: "callers", depth: 2)</text>
    <text x="40" y="252" fill="#8b949e">→ 3 direct callers, 11 transitive · ranked by test-demotion + caller bonus</text>
    <text x="40" y="272" fill="#8b949e">→ top: BillingWorker.charge, ApiGateway.handle, JobQueue.retry</text>

    <!-- answer -->
    <text x="24" y="330" fill="#c9d1d9">Three direct callers: BillingWorker.charge, ApiGateway.handle,</text>
    <text x="24" y="352" fill="#c9d1d9">and JobQueue.retry. BillingWorker.charge is the highest-risk</text>
    <text x="24" y="374" fill="#c9d1d9">path — it has no test coverage and touches the payment queue</text>
    <text x="24" y="396" fill="#c9d1d9">co-change cluster (touched in 8 of the last 12 billing commits).</text>

    <!-- next prompt -->
    <text x="24" y="440" fill="#58a6ff">›</text>
    <rect x="42" y="428" width="8" height="16" fill="#c9d1d9">
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite" />
    </rect>
  </g>
</svg>
